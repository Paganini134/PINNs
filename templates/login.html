{% extends "base.html" %}

{% block title %}Login - PCM Simulation{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4><i class="bi bi-box-arrow-in-right"></i> Login</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="mfa_token" class="form-label">MFA Code (if enabled)</label>
                        <input type="text" class="form-control" id="mfa_token" name="mfa_token" 
                               placeholder="6-digit code from authenticator app">
                        <div class="form-text">Leave blank if MFA is not enabled</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="backup_code" class="form-label">Backup Code (alternative to MFA)</label>
                        <input type="text" class="form-control" id="backup_code" name="backup_code" 
                               placeholder="8-character backup code">
                        <div class="form-text">Use only if you cannot access your authenticator</div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </button>
                </form>
                
                <div class="text-center mt-3">
                    <a href="{{ url_for('register') }}">Don't have an account? Register</a>
                </div>
            </div>
        </div>
        
        <div class="card mt-3">
            <div class="card-body">
                <h6>Demo Account:</h6>
                <p class="mb-0">Username: <code>admin</code><br>
                Password: <code>Admin123!</code></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
